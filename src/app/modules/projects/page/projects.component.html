<div class="h-100 d-flex flex-column">
    <div class="flex-fill">
        <table mat-table [dataSource]="dataSource" class="w-100 px-2 bg-transparent">
            <ng-container matColumnDef="no">
                <th mat-header-cell *matHeaderCellDef class="text-center">
                    <span class="material-icons-outlined">tag</span>
                </th>
                <td mat-cell *matCellDef="let item; let i = index" class="text-center cc-accent"><b>{{ (paginator.pageIndex * paginator.pageSize) + (i + 1) }}</b></td>
            </ng-container>

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef class="px-3">
                    <span class="material-icons-outlined">label</span>
                </th>
                <td mat-cell *matCellDef="let element" class="px-3">
                    <p class="m-0">{{element.name}} </p>
                    <small class="text-muted">{{element.description || 'Brak opisu.'}}</small>
                </td>
            </ng-container>
        
            <ng-container matColumnDef="github">
                <th mat-header-cell *matHeaderCellDef class="text-center">
                    <span class="text-center material-icons-outlined">link</span>
                </th>

                <td mat-cell *matCellDef="let item" class="text-center">
                    <button mat-stroked-button>
                        <a href="{{item.html_url}}" class="material-icons-outlined" target="_blank">
                            code
                        </a>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="['no', 'name', 'github']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['no', 'name', 'github']"></tr>
        </table>
    </div>

    <mat-paginator #paginator pageSize="10" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons class="bg-transparent"></mat-paginator>
</div>
